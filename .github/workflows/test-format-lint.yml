name: Test, format and lint

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main

jobs:
  test-format-lint:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - lambda: blazer
            ruby: 3.0.4
          - lambda: google-cidr
            python: 3.9

    steps:
      - name: Checkout
        uses: actions/checkout@ac593985615ec2ede58e132d2e21d2b1cbd6127c # v3.3.0

      - uses: dorny/paths-filter@4512585405083f25c027a35db413c2b3b9006d50 # tag=v2.11.1
        id: changes
        with:
          filters: |
            lambda:
              - '${{ matrix.lambda }}/**'
              - '.github/workflows/test-format-lint.yml'

      - name: Setup Python
        if: steps.changes.outputs.lambda == 'true' && matrix.python
        uses: actions/setup-python@5ccb29d8773c3f3f653e1705f474dfaa8a06a912 # v4.4.0
        with:
          python-version: ${{ matrix.python }}
          cache: pip

      - name: Setup Ruby
        if: steps.changes.outputs.lambda == 'true' && matrix.ruby
        uses: ruby/setup-ruby@09c10210cc6e998d842ce8433cd9d245933cd797 # v1.133.0
        with:
          ruby-version: ${{ matrix.ruby }}
          bundler-cache: true

      - name: Install deps
        if: steps.changes.outputs.lambda == 'true'
        working-directory: ${{ matrix.lambda }}
        run: make install

      - name: Lint
        if: steps.changes.outputs.lambda == 'true'
        working-directory: ${{ matrix.lambda }}
        run: make lint

      - name: Format
        if: steps.changes.outputs.lambda == 'true'
        working-directory: ${{ matrix.lambda }}
        run: make ARGS=--check fmt

      - name: Test
        if: steps.changes.outputs.lambda == 'true'
        working-directory: ${{ matrix.lambda }}
        run: make test
